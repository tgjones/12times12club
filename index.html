<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12×12 Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Outfit', 'Helvetica Neue', sans-serif;
      user-select: none;
    }

    /* ── Shared overlay ──────────────────────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .screen.hidden { display: none; }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334;
      font-size: 1rem;
      letter-spacing: .2em;
      z-index: 20;
      transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* ── Start screen ────────────────────────────────────────────────────── */
    #start-screen { background: none; }

    .start-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Outfit', 'Helvetica Neue', sans-serif;
    }

    .title-wrap { text-align: center; margin-bottom: 3.2rem; }

    #start-screen h1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: .9rem;
    }

    .title-main {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(4.5rem, 14vw, 9rem);
      line-height: 1;
      letter-spacing: .05em;
      color: #ff99cc;
      text-shadow:
        0 0 10px #ff99cc,
        0 0 30px rgba(255,153,204,.7),
        0 0 80px rgba(255,153,204,.3);
      animation: titlePulse 3.5s ease-in-out infinite;
    }
    .title-x {
      color: #fff;
      text-shadow: 0 0 10px #fff, 0 0 28px rgba(255,255,255,.5);
    }
    .title-sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(.7rem, 2vw, 1rem);
      letter-spacing: .65em;
      text-transform: uppercase;
      color: rgba(255,153,204,.5);
      text-shadow: none;
      padding-left: .65em;
    }
    @keyframes titlePulse {
      0%, 100% {
        text-shadow: 0 0 10px #ff99cc, 0 0 30px rgba(255,153,204,.6), 0 0 70px rgba(255,153,204,.2);
      }
      50% {
        text-shadow: 0 0 18px #ff99cc, 0 0 50px rgba(255,153,204,.8), 0 0 120px rgba(255,153,204,.35);
      }
    }

    .tagline {
      color: rgba(255,153,204,.45);
      font-size: .95rem;
      font-weight: 300;
      letter-spacing: .12em;
      margin: 0;
    }

    .choose-label {
      color: rgba(255,153,204,.38);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .38em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .level-grid {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2.8rem;
    }

    .level-btn {
      background: rgba(255,153,204,.05);
      border: 1px solid rgba(255,153,204,.2);
      border-radius: 18px;
      color: #ff99cc;
      padding: 1.8rem 2rem 1.7rem;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      min-width: 175px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color .25s, box-shadow .25s, background .25s, transform .22s;
    }
    .level-btn:hover {
      border-color: rgba(255,153,204,.6);
      background: rgba(255,153,204,.11);
      box-shadow: 0 0 44px rgba(255,153,204,.2), 0 14px 40px rgba(0,0,0,.5);
      transform: translateY(-7px);
    }
    .level-btn:active {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(255,153,204,.15);
    }

    .level-num {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: .95;
    }
    .level-divider {
      width: 28px;
      height: 1px;
      background: rgba(255,153,204,.22);
      margin: 0 auto 1rem;
    }
    .level-btn strong {
      display: block;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .02em;
      margin-bottom: .3rem;
    }
    .level-btn span {
      display: block;
      color: rgba(255,153,204,.45);
      font-size: .78rem;
      font-weight: 300;
      line-height: 1.5;
    }

    .meta-note {
      color: rgba(255,153,204,.22);
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    #hud.hidden { display: none; }

    #timer {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      font-size: 2.4rem;
      color: rgba(255,255,255,.85);
      letter-spacing: .12em;
    }
    #timer.urgent {
      color: #ff4444;
      text-shadow: 0 0 14px #ff4444;
      animation: blink .5s step-end infinite alternate;
    }
    @keyframes blink { to { opacity: .4; } }

    #hud-level {
      position: absolute;
      top: 22px; left: 22px;
      font-size: .85rem;
      color: rgba(255,255,255,.4);
      letter-spacing: .1em;
    }

    #progress {
      position: absolute;
      top: 22px; right: 22px;
      font-size: 1rem;
      color: rgba(255,255,255,.4);
    }
    #progress b { color: rgba(255,255,255,.85); }

    #answer-wrap {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    #answer-box {
      display: inline-block;
      min-width: 110px;
      font-size: 3.2rem;
      color: #fff;
      letter-spacing: .18em;
      border-bottom: 3px solid rgba(255,255,255,.5);
      padding-bottom: 4px;
      transition: color .1s, border-color .1s;
    }
    #answer-box.wrong {
      color: #ff4444;
      border-color: #ff4444;
      text-shadow: 0 0 14px #ff4444;
    }
    #answer-hint {
      margin-top: 9px;
      font-size: .74rem;
      color: rgba(255,255,255,.28);
      letter-spacing: .07em;
    }

    #back-to-menu {
      position: absolute;
      bottom: 22px; left: 22px;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: .78rem;
      color: rgba(255,255,255,.28);
      letter-spacing: .06em;
      cursor: pointer;
      pointer-events: all;
      transition: color .2s;
    }
    #back-to-menu:hover { color: rgba(255,255,255,.7); }

    /* ── Results ─────────────────────────────────────────────────────────── */
    #results-screen { background: rgba(0, 0, 12, 0.88); gap: 0; }

    #results-title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: .14em;
      margin-bottom: 2rem;
    }
    #results-title.success { color: #00ff66; text-shadow: 0 0 22px #00ff66; }
    #results-title.fail    { color: #ff8844; text-shadow: 0 0 22px #ff8844; }

    .stats-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: .4rem 2.5rem;
      font-size: 1.05rem;
      color: #bb8899;
      margin-bottom: .8rem;
      text-align: left;
    }
    .stats-grid .val { color: #eee; font-size: 1.3rem; font-weight: bold; }

    .result-verdict {
      font-size: .95rem;
      color: #557;
      letter-spacing: .08em;
      margin: 1.4rem 0 2.2rem;
    }
    .result-verdict.good { color: #00ff66; }
    .result-verdict.bad  { color: #ff8844; }

    .btn-row { display: flex; gap: 1rem; }
    .btn {
      background: transparent;
      border: 2px solid rgba(255,153,204,.45);
      color: #ff99cc;
      padding: .8rem 2rem;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: .07em;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .btn:hover {
      border-color: #ff99cc;
      background: rgba(255,153,204,.08);
      box-shadow: 0 0 18px rgba(255,153,204,.3);
    }
  </style>
</head>
<body>

<div id="loading">LOADING…</div>

<!-- Start -->
<div id="start-screen" class="screen hidden">
<div class="start-content">
    <div class="title-wrap">
      <h1>
        <span class="title-main">12<span class="title-x">×</span>12</span>
        <span class="title-sub">Club</span>
      </h1>
      <p class="tagline">TYPE THE ANSWER BEFORE IT REACHES YOU</p>
    </div>
    <p class="choose-label">CHOOSE YOUR LEVEL</p>
    <div class="level-grid">
      <button class="level-btn" data-level="0">
        <div class="level-num">Level 0</div>
        <div class="level-divider"></div>
        <strong>Multiply</strong>
        <span>up to 12 × 12</span>
      </button>
      <button class="level-btn" data-level="1">
        <div class="level-num">Level 1</div>
        <div class="level-divider"></div>
        <strong>Multiply &amp; divide</strong>
        <span>up to 12 × 12</span>
      </button>
      <button class="level-btn" data-level="2">
        <div class="level-num">Level 2</div>
        <div class="level-divider"></div>
        <strong>Multiply &amp; divide</strong>
        <span>up to 24 × 24</span>
      </button>
    </div>
    <p class="meta-note">144 QUESTIONS · 5 MINUTE TARGET</p>
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hud-level"></div>
  <div id="timer">5:00</div>
  <div id="progress"><b>0</b> / 144</div>
  <div id="answer-wrap">
    <div id="answer-box">_</div>
    <div id="answer-hint">TYPE YOUR ANSWER · BACKSPACE TO CORRECT</div>
  </div>
  <button id="back-to-menu">← Menu</button>
</div>

<!-- Results -->
<div id="results-screen" class="screen hidden">
  <h2 id="results-title"></h2>
  <div class="stats-grid" id="stats-grid"></div>
  <p class="result-verdict" id="result-verdict"></p>
  <div class="btn-row">
    <button class="btn" id="retry-btn">TRY AGAIN</button>
    <button class="btn" id="menu-btn">MENU</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { FontLoader }   from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

// ── Constants ──────────────────────────────────────────────────────────────────
const TOTAL_Q    = 144;
const TIME_LIMIT = 300;          // seconds
const SPAWN_Z    = -80;
const STOP_Z     = -8;
const SPEED_MIN  = 55;           // units/sec at game start
const SPEED_MAX  = 130;          // units/sec at game end (ramps up with progress)
const FONT_URL   = './Oswald_Bold.json';

// ── Three.js setup ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:0;';
document.body.prepend(renderer.domElement);


const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080005);
scene.fog = new THREE.FogExp2(0x080005, 0.0022);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);

scene.add(new THREE.AmbientLight(0x331122, 1.2));
const headLight = new THREE.PointLight(0xff99cc, 2, 100);
headLight.position.set(0, 4, 8);
scene.add(headLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.position.set(6, 8, 5);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0xaa4477, 1.2);
rimLight.position.set(-5, -3, 2);
scene.add(rimLight);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Starfield ──────────────────────────────────────────────────────────────────
{
  const count = 3500;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random() - .5) * 900;
    pos[i*3+1] = (Math.random() - .5) * 600;
    pos[i*3+2] = (Math.random() - .5) * 700 - 100;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.4, sizeAttenuation: true, transparent: true, opacity: .65,
  })));
}

// ── Game state ─────────────────────────────────────────────────────────────────
let font        = null;
let state       = 'loading';
let level       = 0;
let questions   = [];
let qIdx        = 0;
let typed       = '';
let correctCnt  = 0;
let wrongTries  = 0;
let startMs     = 0;
let elapsed     = 0;
let mesh        = null;
let meshBaseY   = 0;
let meshStopped = false;
let dyingMeshes = [];
let wrongFlash  = 0;

// ── Question generation ────────────────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPool(maxN, ops, minOne = 1) {
  const pool = [];
  for (let a = 1; a <= maxN; a++) {
    for (let b = 1; b <= maxN; b++) {
      if (a < minOne && b < minOne) continue;
      if (ops.includes('×'))
        pool.push({ q: `${a} × ${b}`, a: a * b });
      if (ops.includes('÷') && b > 1)
        pool.push({ q: `${a * b} ÷ ${b}`, a });
    }
  }
  return shuffle(pool).slice(0, TOTAL_Q);
}

const LEVEL_CFG = [
  { label: 'LEVEL 0', max: 12, ops: ['×'] },
  { label: 'LEVEL 1', max: 12, ops: ['×', '÷'] },
  { label: 'LEVEL 2', max: 24, ops: ['×', '÷'], minOne: 13 },
];

// ── 3D text mesh ───────────────────────────────────────────────────────────────
function createMesh(text) {
  const geo = new TextGeometry(text, {
    font,
    size: 4.5,
    height: 0.7,
    curveSegments: 8,
    bevelEnabled: true,
    bevelThickness: 0.06,
    bevelSize: 0.035,
    bevelSegments: 4,
  });
  geo.computeBoundingBox();
  const bb = geo.boundingBox;
  geo.translate(
    -(bb.min.x + (bb.max.x - bb.min.x) / 2),
    -(bb.min.y + (bb.max.y - bb.min.y) / 2),
    0
  );

  const mat = new THREE.MeshStandardMaterial({
    color: 0xff99cc,
    emissive: 0x883355,
    emissiveIntensity: 0.6,
    metalness: 0.4,
    roughness: 0.35,
    transparent: true,
    opacity: 1,
  });

  const m = new THREE.Mesh(geo, mat);
  m.position.set(
    (Math.random() - .5) * 3,
    (Math.random() - .5) * 1.5,
    SPAWN_Z
  );
  m.rotation.x = (Math.random() - .5) * 0.07;
  m.rotation.y = (Math.random() - .5) * 0.05;
  scene.add(m);
  return m;
}

function dropMesh() {
  if (!mesh) return;
  scene.remove(mesh);
  mesh.geometry.dispose();
  mesh.material.dispose();
  mesh = null;
}

function releaseMeshFalling() {
  if (!mesh) return;
  dyingMeshes.push({ m: mesh, vy: 0 });
  mesh = null;
}

function tickDying(dt) {
  dyingMeshes = dyingMeshes.filter(d => {
    d.vy += 28 * dt;
    d.m.position.y -= d.vy * dt;
    d.m.material.opacity = Math.max(0, d.m.material.opacity - dt * 8);
    if (d.m.material.opacity <= 0) {
      scene.remove(d.m);
      d.m.geometry.dispose();
      d.m.material.dispose();
      return false;
    }
    return true;
  });
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const answerBox = $('answer-box');

function setScreen(name) {
  ['start-screen', 'hud', 'results-screen'].forEach(id => $(id).classList.add('hidden'));
  if (name === 'start')   $('start-screen').classList.remove('hidden');
  if (name === 'playing') $('hud').classList.remove('hidden');
  if (name === 'results') $('results-screen').classList.remove('hidden');
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateHUD() {
  const rem = Math.max(0, TIME_LIMIT - elapsed);
  const timerEl = $('timer');
  timerEl.textContent = fmtTime(rem);
  timerEl.classList.toggle('urgent', rem < 60);
  $('progress').innerHTML = `<b>${correctCnt}</b> / ${TOTAL_Q}`;
}

function refreshAnswerBox() {
  answerBox.textContent = typed || '_';
  answerBox.classList.toggle('wrong', wrongFlash > 0);
}

// ── Game flow ──────────────────────────────────────────────────────────────────
function spawnNext() {
  if (qIdx >= TOTAL_Q) { endGame(); return; }
  mesh = createMesh(questions[qIdx].q);
  meshBaseY = mesh.position.y;
  meshStopped = false;
  typed = '';
  wrongFlash = 0;
  refreshAnswerBox();
}

function startGame(lvl) {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  level      = lvl;
  questions  = buildPool(LEVEL_CFG[lvl].max, LEVEL_CFG[lvl].ops, LEVEL_CFG[lvl].minOne || 1);
  qIdx       = 0;
  correctCnt = 0;
  wrongTries = 0;
  elapsed    = 0;
  startMs    = performance.now();
  state      = 'playing';
  $('hud-level').textContent = LEVEL_CFG[lvl].label;
  setScreen('playing');
  updateHUD();
  spawnNext();
}

function endGame() {
  if (state === 'results') return;
  state = 'results';
  dropMesh();
  dyingMeshes.forEach(d => { scene.remove(d.m); d.m.geometry.dispose(); d.m.material.dispose(); });
  dyingMeshes = [];

  const success = correctCnt === TOTAL_Q && elapsed <= TIME_LIMIT;
  const title   = $('results-title');

  if (success) {
    title.textContent = 'LEVEL COMPLETE!';
    title.className   = 'success';
  } else if (elapsed >= TIME_LIMIT) {
    title.textContent = "TIME'S UP!";
    title.className   = 'fail';
  } else {
    title.textContent = 'FINISHED';
    title.className   = 'success';
  }

  $('stats-grid').innerHTML = `
    <div>Completed</div>      <div class="val">${correctCnt} / ${TOTAL_Q}</div>
    <div>Wrong attempts</div> <div class="val">${wrongTries}</div>
    <div>Time</div>           <div class="val">${fmtTime(elapsed)}</div>
  `;

  const verdict = $('result-verdict');
  if (success) {
    verdict.textContent = '✓ Completed in time — well done!';
    verdict.className   = 'result-verdict good';
  } else if (elapsed >= TIME_LIMIT) {
    const rem = TOTAL_Q - correctCnt;
    verdict.textContent = `× Time ran out — ${rem} question${rem !== 1 ? 's' : ''} remaining`;
    verdict.className   = 'result-verdict bad';
  } else {
    verdict.textContent = '';
    verdict.className   = 'result-verdict';
  }

  setScreen('results');
}

// ── Input ──────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  e.preventDefault();

  if (e.key === 'Backspace') {
    typed = typed.slice(0, -1);
    refreshAnswerBox();
    return;
  }
  if (!/^\d$/.test(e.key)) return;

  wrongFlash = 0;
  const candidate = typed + e.key;

  const answer   = questions[qIdx].a;
  const correct  = parseInt(candidate, 10) === answer;
  const possible = answer.toString().startsWith(candidate);

  if (correct) {
    typed = candidate;
    refreshAnswerBox();
    correctCnt++;
    qIdx++;
    releaseMeshFalling();
    if (qIdx >= TOTAL_Q) { endGame(); return; }
    spawnNext();
    updateHUD();
  } else if (!possible) {
    typed = '';          // clear before any repaint
    wrongTries++;
    wrongFlash = 28;
    if (mesh) {
      mesh.material.color.set(0xff3333);
      mesh.material.emissive.set(0x440000);
      setTimeout(() => {
        if (mesh) {
          mesh.material.color.set(0xff99cc);
          mesh.material.emissive.set(0x883355);
        }
      }, 260);
    }
    refreshAnswerBox();
  } else {
    // possible prefix — show the accumulated digits
    typed = candidate;
    refreshAnswerBox();
  }
});

document.querySelectorAll('.level-btn').forEach(btn =>
  btn.addEventListener('click', () => startGame(+btn.dataset.level))
);
$('retry-btn').addEventListener('click', () => startGame(level));
$('menu-btn').addEventListener('click', () => {
  state = 'start';
  dropMesh();
  setScreen('start');
});
$('back-to-menu').addEventListener('click', () => {
  state = 'start';
  dropMesh();
  setScreen('start');
});

// ── Render loop ────────────────────────────────────────────────────────────────
let prev = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - prev) / 1000, 0.1);
  prev = now;

  if (state === 'playing') {
    elapsed = (performance.now() - startMs) / 1000;

    if (elapsed >= TIME_LIMIT) {
      endGame();
      renderer.render(scene, camera);
      return;
    }

    updateHUD();

    if (mesh) {
      if (!meshStopped) {
        const progress = correctCnt / TOTAL_Q;
        const speed    = SPEED_MIN + (SPEED_MAX - SPEED_MIN) * progress;
        mesh.position.z += speed * dt;
        if (mesh.position.z >= STOP_Z) {
          mesh.position.z = STOP_Z;
          meshBaseY = mesh.position.y;
          meshStopped = true;
        }
      } else {
        mesh.position.y        = meshBaseY + Math.sin(now * 0.0025) * 0.18;
        mesh.material.emissiveIntensity = 0.5 + Math.sin(now * 0.004) * 0.32;
      }
    }

    if (wrongFlash > 0) { wrongFlash--; refreshAnswerBox(); }
    tickDying(dt);
  }

  renderer.render(scene, camera);
}

// ── Load font, then show start ─────────────────────────────────────────────────
new FontLoader().load(
  FONT_URL,
  f => {
    font = f;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    $('loading').classList.add('hidden');
    state = 'start';
    setScreen('start');
  },
  undefined,
  () => { $('loading').textContent = 'FONT LOAD FAILED — check network'; }
);

animate(0);
</script>
</body>
